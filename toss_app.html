<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WeJump 퀀트 연구소</title>
    <noscript src="https://static.toss.im/apps-in-toss/sdk/v1/index.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #1a1a1a; /* 대시보드 배경색과 통일 (다크모드) */
        }
        #main-frame { 
            width: 100%; 
            height: 100vh; /* 화면 전체 사용 */
            border: none; 
            display: block;
        }
    </style>
</head>
<body>

    <iframe id="main-frame" src="https://crowmag2.github.io/wejump/toss_dashboard.html" allowfullscreen></iframe>

    <noscript>
        // 토스 앱에 안전 구동 신호 전송 (필수)
        const toss = new AppsInToss();
        toss.init().catch(err => {
            console.log("일반 웹 브라우저 환경에서 실행 중입니다.");
        });
    </noscript>
</body>
</html>
